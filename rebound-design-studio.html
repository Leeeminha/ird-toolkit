",energy:"low",picked:!1}],energy:"med",hint:{short:"네트워크 기반 분기만으로도 셀룰러 트래픽 상당 부분을 덜어낼 수 있어요.",long:"Wi-Fi 한정 자동재생은 낮은 친숙도 비용으로 도입 가능한 완화책입니다. 다만 “Wi-Fi = 저탄소”는 아닙니다 — Wi-Fi도 결국 동일한 데이터센터·CDN을 사용하므로, 전송 구간의 변동만 줄일 뿐 원천 콘텐츠 생성 비용은 그대로입니다.",refs:[{label:"Carbon Trust — Carbon impact of video streaming (2021)",url:"https://www.carbontrust.com/our-work-and-impact/guides-reports-and-tools/carbon-impact-of-video-streaming"}]}},{id:"n4",type:"image",x:220,y:430,caption:"레퍼런스 · 경쟁사 피드 A",imageLabel:"product shot · feed grid",energy:"med",hint:{short:"이 레퍼런스의 밀집 그리드는 뷰포트에 비디오 4–6개가 동시 프리로드될 가능성이 있습니다.",long:"밀집된 그리드 레이아웃에서 “모든 카드에 미리보기 비디오”는 스크롤 한 번에 수십 MB의 사전 전송을 만들 수 있습니다. 카드 단위 지연 로딩(lazy) + 섬네일 → 호버/롱프레스 시 비디오 전환을 고려해볼 만합니다.",refs:[{label:"web.dev — Fast playback with video preload",url:"https://web.dev/fast-playback-with-preload/"}]}},{id:"n5",type:"postit",x:540,y:460,rot:1.6,kicker:"가설",text:"호버 시 미리보기 GIF → 클릭해야 고화질 비디오 로드. 본 영상에 도달하는 사용자 비율은 12% 내외 추정.",energy:"low",hint:{short:"“진짜로 볼 사람에게만 전송”하는 전환 구조는 전형적인 저영향 패턴이에요.",long:"사용자 의도를 한 번 더 확인받는 UI(Click-to-load)는 콘텐츠 게재 에너지 소비를 표적화합니다. 다만 인지적 마찰이 생기므로, 호버/롱프레스처럼 “거의 클릭에 가까운” 시그널을 사용하면 전환률 손실을 최소화할 수 있습니다.",refs:[{label:"Sustainable UX Network — Patterns",url:"https://sustainableuxnetwork.com/"}]}},{id:"n6",type:"postit",x:820,y:460,rot:-.8,kicker:"리바운드",text:"“에너지 절약” 문구를 보여주면 오히려 더 많이 보게 되는 역설?",energy:"med",hint:{short:"절약을 강조할수록 사용 총량이 늘어나는 Jevons 효과가 디지털에도 관찰됩니다.",long:"Jevons paradox는 효율 개선이 사용량을 늘려 총 소비를 증가시키는 경향을 말합니다. “이 영상은 에너지 효율적” 배지가 사용자에게 “마음 놓고 더 봐도 된다”는 허가로 읽힐 수 있어, 설계 문구의 뉘앙스에 주의가 필요합니다.",refs:[{label:"Jevons paradox — Wikipedia",url:"https://en.wikipedia.org/wiki/Jevons_paradox"},{label:"Gossart (2015) — Rebound effects & ICT",url:"https://link.springer.com/chapter/10.1007/978-3-319-09228-7_26"}]}}],edges:[{id:"e1",from:"n1",to:"n3",style:"strong",label:"제안"},{id:"e2",from:"n2",to:"n3",style:"strong",label:"고민"},{id:"e3",from:"n3",to:"n5",style:"strong",label:"대안"},{id:"e4",from:"n4",to:"n1",style:"strong",label:"참고"},{id:"e5",from:"n5",to:"n6",style:"strong",label:"주의"}]},Yn=`당신은 "Rebound Design Studio"의 AI 리플렉션 보조자입니다.
